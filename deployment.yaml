apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-k8s-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-k8s-app
  template:
    metadata:
      labels:
        app: node-k8s-app
    spec:
      containers:
      - name: node-k8s-app
        image: 385129732245.dkr.ecr.eu-north-1.amazonaws.com/node-k8s-app:latest
        ports:
        - containerPort: 3000